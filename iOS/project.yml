name: Paddlelog
options:
  bundleIdPrefix: com.shimondeitel.paddlelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Paddlelog:
    type: application
    platform: iOS
    sources:
      - path: Paddlelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.paddlelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Paddlelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PaddlelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PaddlelogTests
      - path: Paddlelog.storekit
    dependencies:
      - target: Paddlelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.paddlelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PaddlelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PaddlelogUITests
    dependencies:
      - target: Paddlelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.paddlelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Paddlelog:
    build:
      targets:
        Paddlelog: all
        PaddlelogTests: [test]
        PaddlelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Paddlelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Paddlelog.storekit
      targets:
        - PaddlelogTests
        - PaddlelogUITests
    archive:
      config: Release
